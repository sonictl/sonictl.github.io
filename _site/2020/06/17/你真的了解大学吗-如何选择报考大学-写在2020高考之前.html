<h3 id="我的指标">我的指标：</h3>
<h4 id="1-大学的综合能力看什么">1. 大学的综合能力看什么：</h4>
<ul>
  <li>两院院士人数</li>

  <li>待续。</li>
</ul>

<h4 id="2-专业能力看什么">2. 专业能力看什么：</h4>
<ul>
  <li>某个专业国际最顶级，最权威期刊、会议，论文数。</li>
  <li>某个专业下，是否有杰青（这一条就说明问题了）</li>
  <li>博导的博士毕业人数，招录人数，历年统计。（这一条可以发现很多问题😀，人说我考大学，看博导作甚？博导就是专业能力的代表。）</li>
</ul>
