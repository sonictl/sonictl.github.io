title: Combine Art and Sciences
subtitle: subtitle here and you like it
author: sonictl
# email:  # Comment out this line if you don't want to expose your email.
avatar_url: https://2.gravatar.com/avatar/cdf546b601bf29a7eb4ca777544d11cd?s=160

description: >  # this means to ignore newlines until "baseurl:"
  自己的博客掌握在自己手中。

repository: sonictl/sonictl.github.io
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://sonictl.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# social links:
twitter_username: jekyll
github_username:  jekyll


# Build settings
theme: minima
plugins:
  - jekyll-feed

# Google Analytics
google_analytics: UA-200656646-1   # UA—XXXXXXXX-X

# About categories: https://blog.webjeda.com/jekyll-categories/
# permalink: /:categories/:title/

# implement comment function using github pull request
comments:     
  enabled: true
  show_count: true
  receiver: https://jekyll-comments.azurewebsites.net/api/PostComment
  #eg.      https://haacked-blog.azurewebsites.net/api/PostComment
emptyArray: []


defaults:
  -
    scope:
      path: ''
      type: pages
    values:
      layout: page
      author: sonictl
      commenting: open
  -
    scope:
      path: '_posts'
      type: posts
    values:
      layout: post
      author: sonictl
      commenting: open


